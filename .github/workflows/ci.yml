name: CI

on:
  push:
    branches: main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build zisk.nix
    runs-on: warp-ubuntu-latest-x64-16x
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - run: nix build .#zisk-toolchain -L --accept-flake-config
      - run: nix build .#ziskemu -L --accept-flake-config
      - run: nix build .#cargo-zisk -L --accept-flake-config
      - run: nix build .#zisk-home -L --accept-flake-config

